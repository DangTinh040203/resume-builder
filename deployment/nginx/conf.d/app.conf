# ─── Frontend (Next.js) ──────────────────────────────────────────────────────
# cv-builder.site (+ www → apex)  →  fe:3001

server {
    listen 80;
    server_name cv-builder.site www.cv-builder.site;

    # Certbot HTTP-01 challenge (webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://cv-builder.site$request_uri;
    }
}

# Redirect www → apex over HTTPS.
server {
    listen 443 ssl;
    http2 on;
    server_name www.cv-builder.site;

    ssl_certificate     /etc/letsencrypt/live/cv-builder.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cv-builder.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cv-builder.site$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name cv-builder.site;

    ssl_certificate     /etc/letsencrypt/live/cv-builder.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cv-builder.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://fe:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
