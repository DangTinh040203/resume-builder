# ─── Backend (NestJS) ────────────────────────────────────────────────────────
# api.cv-builder.site  →  be:4000   (REST under /api/v1 + WebSocket /interview)

# Required for WebSocket upgrade (InterviewGateway). Defined once, in http ctx.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.cv-builder.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.cv-builder.site;

    ssl_certificate     /etc/letsencrypt/live/cv-builder.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cv-builder.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Resume / file uploads.
    client_max_body_size 25m;

    location / {
        proxy_pass         http://be:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade + long-lived interview sockets.
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
