<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resume Builder Docs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resume Builder — Project Documentation" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --theme-color: #4f46e5;
        --sidebar-width: 280px;
      }
      .sidebar-toggle { background: var(--theme-color); }
      .markdown-section h1 { font-size: 2rem; }
      .markdown-section code { background: #f0f0f7; border-radius: 4px; }
      .markdown-section .mermaid { text-align: center; margin: 1.5rem 0; }
      .markdown-section table { display: table; width: 100%; }
    </style>
  </head>
  <body>
    <div id="app">Loading...</div>
    <script>
      window.$docsify = {
        name: '📄 Resume Builder',
        repo: 'https://github.com/DangTinh040203/resume-builder',
        loadSidebar: true,
        loadNavbar: false,
        subMaxLevel: 3,
        auto2top: true,
        search: {
          placeholder: 'Search docs...',
          noData: 'No results found.',
          depth: 6,
        },
        copyCode: {
          buttonText: 'Copy',
          errorText: 'Error',
          successText: 'Copied!',
        },
        pagination: {
          previousText: '← Previous',
          nextText: 'Next →',
          crossChapter: true,
        },
        themeColor: '#4f46e5',
        markdown: {
          renderer: {
            code(code, lang) {
              if (lang === 'mermaid') {
                return '<div class="mermaid">' + code + '</div>';
              }
              return this.origin.code.apply(this, arguments);
            },
          },
        },
        plugins: [
          function (hook) {
            hook.doneEach(function () {
              if (window.mermaid) {
                window.mermaid.run({ querySelector: '.mermaid' });
              }
            });
          },
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      window.mermaid && window.mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    </script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  </body>
</html>
