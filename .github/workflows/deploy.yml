name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys against the VM at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: resume-builder-500417
  GCP_REGION: asia-southeast1
  GAR_HOST: asia-southeast1-docker.pkg.dev
  GAR_REPO: resume-builder-registry
  VM_NAME: resume-builder-vm
  VM_ZONE: asia-southeast1-c
  DEPLOY_DIR: /opt/resume-builder

jobs:
  # NOTE: DB migrations are NOT run here — they are applied manually on prod.

  # ─── 1a. Build + push BE image (keyless WIF) ────────────────────────────────
  build-be:
    name: Build & push BE
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push BE
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.be
          push: true
          tags: |
            ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/be:${{ github.sha }}
            ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/be:latest
          cache-from: type=gha,scope=be
          cache-to: type=gha,mode=max,scope=be

  # ─── 1b. Build + push FE image (NEXT_PUBLIC_* baked in at build) ────────────
  build-fe:
    name: Build & push FE
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # FE env is one secret blob. Extract the build-time NEXT_PUBLIC_* keys and
      # expose them to later steps (values stay masked because they're secrets).
      - name: Load FE build args
        run: |
          cat > /tmp/fe.env <<'EOF'
          ${{ secrets.FE_ENV_PRODUCTION }}
          EOF
          grep -E '^(NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY|NEXT_PUBLIC_BASE_URL|NEXT_PUBLIC_WS_URL|NEXT_PUBLIC_REDIRECT_URL|NEXT_PUBLIC_CLERK_SIGN_IN_URL)=' /tmp/fe.env >> "$GITHUB_ENV"

      - name: Authenticate to GCP (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push FE
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.fe
          push: true
          tags: |
            ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/fe:${{ github.sha }}
            ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/fe:latest
          cache-from: type=gha,scope=fe
          cache-to: type=gha,mode=max,scope=fe
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ env.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_WS_URL=${{ env.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_REDIRECT_URL=${{ env.NEXT_PUBLIC_REDIRECT_URL }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ env.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}

  # ─── 2. Deploy: push .env + compose, pull images, recreate containers ───────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [build-be, build-fe]
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp docker/docker-compose.prod.yml deploy/docker-compose.yml
          cp -r deployment/nginx deploy/nginx
          cp -r deployment/scripts deploy/scripts
          cat > deploy/.env <<'EOF'
          ${{ secrets.BE_ENV_PRODUCTION }}
          EOF

      - name: Ensure deploy dir on VM
        run: |
          gcloud compute ssh "$VM_NAME" --zone "$VM_ZONE" \
            --command "sudo mkdir -p $DEPLOY_DIR && sudo chown \$(whoami) $DEPLOY_DIR"

      - name: Copy .env + compose + nginx to VM
        run: |
          gcloud compute scp deploy/.env "$VM_NAME:$DEPLOY_DIR/.env" --zone "$VM_ZONE"
          gcloud compute scp deploy/docker-compose.yml "$VM_NAME:$DEPLOY_DIR/docker-compose.yml" --zone "$VM_ZONE"
          gcloud compute scp --recurse deploy/nginx "$VM_NAME:$DEPLOY_DIR/" --zone "$VM_ZONE"
          gcloud compute scp --recurse deploy/scripts "$VM_NAME:$DEPLOY_DIR/" --zone "$VM_ZONE"
          gcloud compute ssh "$VM_NAME" --zone "$VM_ZONE" --command "chmod 600 $DEPLOY_DIR/.env"

      - name: Pull new images & recreate containers
        run: |
          gcloud compute ssh "$VM_NAME" --zone "$VM_ZONE" --command "
            set -euo pipefail
            cd $DEPLOY_DIR
            # docker runs via sudo — the OS Login user isn't in the docker group.
            # Configure Artifact Registry auth for root too; the VM pulls keylessly via its SA.
            sudo gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet
            # Free disk BEFORE pulling — old <sha> images aren't dangling so a plain
            # prune misses them; on the small boot disk they fill it and the pull
            # ENOSPCs. Running containers keep their images, so no downtime here.
            sudo docker image prune -af
            sudo env IMAGE_TAG='${{ github.sha }}' GAR_IMAGE_PREFIX='${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}' docker compose pull
            sudo env IMAGE_TAG='${{ github.sha }}' GAR_IMAGE_PREFIX='${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}' docker compose up -d --remove-orphans
            # Reclaim the now-replaced previous images.
            sudo docker image prune -af
          "

      - name: Health check
        run: |
          gcloud compute ssh "$VM_NAME" --zone "$VM_ZONE" --command "
            set -e
            # BE is `expose`d on the docker network only (not published to the host),
            # so probe from inside the container, not via the VM's localhost:4000.
            for i in \$(seq 1 30); do
              if sudo docker compose -f $DEPLOY_DIR/docker-compose.yml exec -T be wget -qO- http://localhost:4000/api/v1/health > /dev/null 2>&1; then
                echo 'BE healthy'; exit 0
              fi
              echo \"waiting for BE... (\$i)\"; sleep 5
            done
            echo 'BE health check failed'
            sudo docker compose -f $DEPLOY_DIR/docker-compose.yml logs --tail=50 be
            exit 1
          "
