# Production compose — runs ON the VM (copied to /opt/resume-builder/docker-compose.yml).
# Images are pulled from Artifact Registry by the deploy workflow (full
# asia-southeast1-docker.pkg.dev/... path), then retagged to the short local
# names below. Nothing is built or pulled here — hence pull_policy: never.
#
# Required env (exported by the deploy workflow before `docker compose`):
#   IMAGE_TAG = <short git sha>   (falls back to `latest`)
#
# Runtime secrets live in /opt/resume-builder/.env on the VM (chmod 600, NOT committed).

name: resume-builder

services:
  fe:
    image: resume-builder/fe:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    expose:
      - "3001"
    # NEXT_PUBLIC_* are baked in at build. But clerkMiddleware (proxy.ts) runs on
    # EVERY request and verifies the session server-side, so the secret key is
    # required at RUNTIME too. Pulled from .env (the BE_ENV_PRODUCTION blob).
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    healthcheck:
      # Next binds IPv4 0.0.0.0 only; `localhost` resolves to ::1 (IPv6) in alpine
      # → connection refused. Force IPv4 with 127.0.0.1.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      be:
        condition: service_healthy

  be:
    image: resume-builder/be:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Provision these on the VM (nginx config + Let's Encrypt certs via Certbot).
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      fe:
        condition: service_healthy
      be:
        condition: service_healthy

volumes:
  certbot_www:
